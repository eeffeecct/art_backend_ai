name: Backend CI/CD

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

permissions:
  contents: read
  packages: write

env:
  IMAGE: ghcr.io/${{ github.repository_owner }}/art-backend-ai

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      # Tests are skipped here: the only test is a full @SpringBootTest that needs a
      # live Postgres + RabbitMQ. Compiling/packaging is what validates the build.
      - name: Build with Maven
        run: mvn -B -DskipTests package --file pom.xml

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # --- Pull requests: build the image to verify the Dockerfile, do NOT push ---
      - name: Build image (PR check)
        if: github.event_name == 'pull_request'
        run: docker build -t art-backend-ai:pr .

      # --- Pushes to main: build & push to GHCR ---
      - name: Log in to GHCR
        if: github.event_name == 'push'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & push image
        if: github.event_name == 'push'
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ env.IMAGE }}:latest
            ${{ env.IMAGE }}:${{ github.sha }}

  deploy:
    needs: build
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      # Requires repo secrets: SSH_HOST, SSH_USER, SSH_KEY, DEPLOY_DIR (see DEPLOY.md).
      - name: Deploy to server over SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          script: |
            cd ${{ secrets.DEPLOY_DIR }}
            docker compose -f docker-compose.prod.yml pull backend
            docker compose -f docker-compose.prod.yml up -d backend
            docker image prune -f
